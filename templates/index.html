<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamFlix • Recommender</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;
  background: radial-gradient(1200px 600px at 50% -10%, #1a0033, #000);
  color:#fff;
}

/* Layout */
.container{max-width:1100px;margin:auto;padding:50px 20px}
.header{text-align:center;margin-bottom:30px}
.header h1{
  font-size:3rem;
  background:linear-gradient(90deg,#a78bfa,#f472b6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.header p{color:#9ca3af;margin-top:8px}

/* Seed input */
.seed-box{
  display:flex;gap:10px;justify-content:center;margin:30px 0;
}
.seed-box input{
  width:60%;max-width:520px;
  padding:14px 16px;border-radius:12px;border:none;
  background:rgba(255,255,255,0.08);color:#fff;font-size:15px;
}
.seed-box input:focus{outline:none;box-shadow:0 0 10px #a78bfa}
.seed-box button{
  padding:14px 18px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#a78bfa,#f472b6);
  color:#fff;font-weight:600;cursor:pointer;
}
.seed-box button:hover{transform:scale(1.04)}

/* Sections */
.section-title{
  font-size:1.2rem;margin:10px 0 10px 6px;color:#c7d2fe;
}
.helper{color:#9ca3af;font-size:0.9rem;margin-bottom:10px}

/* Grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:18px;margin-top:12px;
}
.card{
  background:rgba(255,255,255,0.05);
  border-radius:12px;overflow:hidden;cursor:pointer;
  transition:0.25s;
}
.card:hover{transform:translateY(-6px) scale(1.02)}
.card img{width:100%;height:260px;object-fit:cover}
.card .meta{padding:10px}
.card h3{font-size:0.95rem;margin-bottom:4px}
.badge{
  font-size:11px;background:#7c3aed;padding:3px 6px;
  border-radius:6px;margin-right:4px;display:inline-block
}
.sim{font-size:12px;color:#a5b4fc;margin-top:4px}

/* States */
.center{ text-align:center; margin-top:20px; color:#9ca3af;}
.error{ color:#f87171; }
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>Find Movies You Love</h1>
    <p>Pick a movie you liked. We’ll recommend similar ones.</p>
  </div>

  <!-- Seed movie input -->
  <div class="seed-box">
    <input id="movie" placeholder="Type a movie (e.g., Avatar, )" />
    <button onclick="recommend()">Recommend</button>
  </div>

  <div id="status" class="center"></div>

  <!-- Results -->
  <div id="section">
    <div id="section-title" class="section-title"></div>
    <div id="helper" class="helper"></div>
    <div id="results" class="grid"></div>
  </div>

</div>

<script>
const API = window.location.origin;

// Render cards (click card to re-seed recommendations)
function renderCards(list, titleText, helperText = "") {
  const grid = document.getElementById("results");
  const title = document.getElementById("section-title");
  const helper = document.getElementById("helper");

  title.innerText = titleText;
  helper.innerText = helperText;

  if (!list || list.length === 0) {
    grid.innerHTML = "";
    document.getElementById("status").innerText = "No results found.";
    return;
  }

  document.getElementById("status").innerText = "";

  let html = "";
  list.forEach(m => {
    const poster = m.poster || "https://via.placeholder.com/300x450";
    const genres = (m.genres || []).slice(0,3).map(g => `<span class="badge">${g}</span>`).join("");
    const sim = (m.similarity !== undefined) ? `<div class="sim">Similarity: ${m.similarity}%</div>` : "";

    html += `
      <div class="card" onclick="reseed('${m.title.replace(/'/g, "\\'")}')">
        <img src="${poster}">
        <div class="meta">
          <h3>${m.title}</h3>
          <div>${genres}</div>
          ${sim}
        </div>
      </div>
    `;
  });

  grid.innerHTML = html;
}

// Recommend from input
async function recommend() {
  const movie = document.getElementById("movie").value.trim();
  if (!movie) return;

  document.getElementById("status").innerText = "Finding similar movies…";

  try {
    const res = await fetch(`${API}/recommend?movie=${encodeURIComponent(movie)}&n=10`);
    const data = await res.json();

    renderCards(
      data,
      `More like "${movie}"`,
      "Click any movie card to explore more like it."
    );
  } catch (e) {
    document.getElementById("status").innerHTML = "<span class='error'>Server error. Try again.</span>";
  }
}

// Click a card to reseed
function reseed(title) {
  document.getElementById("movie").value = title;
  recommend();
}

// Load trending on first load
async function loadTrending() {
  document.getElementById("status").innerText = "Loading trending…";
  try {
    const res = await fetch(`${API}/trending`);
    const data = await res.json();

    renderCards(
      data,
      "Trending Movies",
      "Pick any title to get recommendations."
    );
  } catch (e) {
    document.getElementById("status").innerHTML = "<span class='error'>Failed to load trending.</span>";
  }
}

// Enter key support
document.getElementById("movie").addEventListener("keypress", (e) => {
  if (e.key === "Enter") recommend();
});

// Init
window.onload = loadTrending;
</script>

</body>
</html>
