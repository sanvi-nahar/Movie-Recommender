<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMatch — Film Recommendations</title>

<!-- Fonts: Playfair Display for editorial serif headings, Inter for high-readability body -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  /* Semantic Light Editorial Design Tokens (No Dark Modes/Variables) */
  --bg-page: #F5F1E8;         /* Warm Ivory Background */
  --bg-surface: #FFFFFF;      /* Pure White Surface (Cards, Headers) */
  --bg-section: #FAF8F4;      /* Editorial Off-White Section Background */
  --bg-light: #FAF8F4;       /* Helper Sand Background */
  
  --text-primary: #1C1917;    /* Primary Text (Dark Charcoal) */
  --text-secondary: #78716C;  /* Secondary Text (Warm Grey) */
  --text-tertiary: #A8A29E;   /* Muted Sand Grey */
  
  --accent: #B45309;          /* Restrained Amber Accent */
  --accent-hover: #92400E;    /* Dark Amber Accent */
  --accent-light: rgba(180, 83, 9, 0.08);
  
  --border-color: #D6D3D1;    /* Thin Sand Borders */
  --border-hover: #A8A29E;    /* Active Borders */
  
  --font-heading: 'Playfair Display', Georgia, serif;
  --font-body: 'Inter', sans-serif;
  
  --shadow-sm: 0 1px 3px rgba(28, 25, 23, 0.03);
  --shadow-md: 0 8px 24px rgba(28, 25, 23, 0.04);
  
  /* Sharp, editorial borders mimicking printed journal layouts */
  --radius-sm: 0px;
  --radius-md: 0px;
  --radius-lg: 0px;
  
  --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: var(--font-body);
  background-color: var(--bg-page);
  color: var(--text-primary);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Header (Clean Magazine Bar) */
.navbar {
  border-bottom: 1px solid var(--border-color);
  background-color: var(--bg-surface);
  padding: 18px 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}

.navbar-container {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.navbar-brand {
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 1.5rem;
  letter-spacing: -0.01em;
  color: var(--text-primary);
  text-decoration: none;
  display: flex;
  align-items: center;
}

.navbar-brand svg {
  margin-right: 12px;
  stroke: var(--accent);
}

.navbar-nav {
  display: flex;
  gap: 28px;
}

.navbar-link {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 500;
  transition: var(--transition);
  position: relative;
  padding-bottom: 4px;
}

.navbar-link:hover {
  color: var(--text-primary);
}

.navbar-link.active {
  color: var(--text-primary);
  font-weight: 600;
}

.navbar-link.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 2px;
  background-color: var(--accent);
}

/* Layout Container */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 24px 60px 24px;
  flex: 1;
}

/* Hero Section */
.hero {
  text-align: center;
  margin-bottom: 16px;
  max-width: 640px;
  margin-left: auto;
  margin-right: auto;
  padding-top: 8px;
}

.hero h1 {
  font-family: var(--font-heading);
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--text-primary);
  margin-bottom: 6px;
  line-height: 1.15;
}

.hero p {
  color: var(--text-secondary);
  font-size: 0.93rem;
  line-height: 1.5;
  margin-bottom: 0px;
}

/* Search Seed Box - Core focus of page */
.search-container {
  position: relative;
  max-width: 560px;
  margin: 0 auto 24px auto;
  display: flex;
  gap: 8px;
  background-color: var(--bg-surface);
  padding: 5px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border-color);
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
}

.search-container:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(180, 83, 9, 0.12);
}

.search-input-wrapper {
  position: relative;
  flex: 1;
  display: flex;
  align-items: center;
}

.search-icon {
  position: absolute;
  left: 14px;
  color: var(--text-tertiary);
  pointer-events: none;
  display: flex;
  align-items: center;
}

.search-input {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text-primary);
  padding: 12px 12px 12px 42px;
  font-family: var(--font-body);
  font-size: 0.95rem;
}

.search-input::placeholder {
  color: var(--text-tertiary);
}

.search-input:focus {
  outline: none;
}

.btn-primary {
  background-color: var(--accent);
  color: #ffffff;
  border: none;
  border-radius: var(--radius-md);
  padding: 10px 22px;
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 0.9rem;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-primary:hover {
  background-color: var(--accent-hover);
}

.btn-primary:active {
  transform: scale(0.98);
}

.btn-primary:disabled {
  background-color: var(--bg-light);
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  cursor: not-allowed;
  transform: none;
}

/* Loading Spinner */
.spinner {
  width: 16px;
  height: 16px;
  border: 2px solid rgba(180, 83, 9, 0.15);
  border-top-color: #ffffff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: inline-block;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Spotlight Featured Banner (Curated magazine compositing) */
.spotlight-container {
  background-color: var(--bg-section);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-top: 0px; /* Positioned right after search */
  margin-bottom: 44px;
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
}

.spotlight-content {
  display: flex;
  flex-direction: row;
  align-items: stretch;
}

.spotlight-info {
  flex: 1.3;
  padding: 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.spotlight-badge {
  align-self: flex-start;
  font-family: var(--font-body);
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--accent);
  background-color: var(--accent-light);
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  margin-bottom: 12px; /* Tighter layout */
}

.spotlight-title {
  font-family: var(--font-heading);
  font-size: 2.75rem; /* Increased title prominence */
  font-weight: 700;
  color: var(--text-primary);
  margin: 0 0 6px 0;
  line-height: 1.15;
}

.spotlight-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  font-size: 0.88rem;
  color: var(--text-secondary);
}

.spotlight-year {
  font-weight: 500;
}

.spotlight-rating {
  display: flex;
  align-items: center;
  gap: 4px;
  color: var(--accent);
  font-weight: 600;
}

.spotlight-tagline {
  font-family: var(--font-heading);
  font-style: italic;
  font-size: 1.05rem;
  color: var(--text-secondary);
  margin-bottom: 14px;
  border-left: 2px solid var(--border-color);
  padding-left: 12px;
}

.spotlight-overview {
  font-size: 0.9rem;
  color: var(--text-secondary);
  line-height: 1.55;
  margin-bottom: 22px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.spotlight-genres-text {
  font-weight: 500;
  color: var(--text-secondary);
}

.spotlight-poster-wrapper {
  flex: 0.7;
  background-color: var(--bg-page);
  display: flex;
  justify-content: center;
  align-items: center;
  max-height: 440px;
  overflow: hidden;
  border-left: 1px solid var(--border-color);
}

.spotlight-poster {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
}

.spotlight-container:hover .spotlight-poster {
  transform: scale(1.02);
}

.spotlight-btn {
  align-self: flex-start;
  padding: 11px 22px;
  font-size: 0.9rem;
}

/* Section Header */
.section-header {
  display: flex;
  flex-direction: row;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--border-color);
  padding-bottom: 10px;
}

.section-title {
  font-family: var(--font-heading);
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--text-primary);
  margin: 0;
}

.helper {
  font-size: 0.82rem;
  color: var(--text-tertiary);
  margin-top: 0;
}

/* Results Fade In */
.fade-in {
  opacity: 0;
  animation: fadeInEffect 0.4s ease-out forwards;
}

@keyframes fadeInEffect {
  to { opacity: 1; }
}

/* Movie Cards Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
  gap: 18px;
}

.card {
  background-color: var(--bg-surface);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-sm);
}

.card:hover {
  transform: translateY(-4px);
  border-color: var(--border-hover);
  box-shadow: var(--shadow-md);
}

.card-poster-wrapper {
  position: relative;
  width: 100%;
  aspect-ratio: 2 / 3;
  overflow: hidden;
  background-color: var(--bg-page);
  border-bottom: 1px solid var(--border-color);
}

.card-poster {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.3s ease;
}

.card:hover .card-poster {
  transform: scale(1.03);
}

.card-meta {
  padding: 16px;
  flex: 1;
  display: flex;
  flex-direction: column;
}

.card-title {
  font-family: var(--font-heading);
  font-size: 1.05rem;
  font-weight: 700;
  margin: 0 0 8px 0;
  color: var(--text-primary);
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-genres {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 12px;
}

.badge {
  font-size: 0.7rem;
  background-color: var(--bg-page);
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  padding: 2px 6px;
  border-radius: var(--radius-sm);
  font-weight: 500;
}

/* Muted warm sand genre tags (amber strictly saved for CTAs/labels) */
.card-genres .badge {
  background-color: var(--bg-light);
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
}

.card:hover .badge {
  border-color: var(--border-hover);
}

.card:hover .card-genres .badge {
  color: var(--text-primary);
}

.sim {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--accent);
  margin-top: auto;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* Skeleton Pulse Loaders */
.skeleton-card {
  background-color: var(--bg-surface);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.skeleton-poster {
  width: 100%;
  aspect-ratio: 2 / 3;
  animation: pulse 1.5s infinite ease-in-out;
  border-bottom: 1px solid var(--border-color);
}

.skeleton-meta {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.skeleton-title {
  height: 16px;
  width: 80%;
  border-radius: 2px;
  animation: pulse 1.5s infinite ease-in-out;
}

.skeleton-genre {
  height: 12px;
  width: 45%;
  border-radius: 2px;
  animation: pulse 1.5s infinite ease-in-out;
}

@keyframes pulse {
  0% { background-color: var(--bg-page); }
  50% { background-color: var(--bg-section); }
  100% { background-color: var(--bg-page); }
}

/* Status States */
.center {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-secondary);
  font-size: 1rem;
}

.error-message {
  color: #B45309;
  background-color: rgba(180, 83, 9, 0.04);
  border: 1px solid rgba(180, 83, 9, 0.15);
  padding: 14px 20px;
  border-radius: var(--radius-md);
  display: inline-block;
  max-width: 480px;
  margin: 16px auto;
  font-size: 0.95rem;
}

/* Modal UI styles */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(28, 25, 23, 0.3); /* Soft warm overlay */
  z-index: 1000;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 24px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s ease-in-out;
}

.modal-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.modal-container {
  background-color: var(--bg-surface);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  max-width: 820px;
  width: 100%;
  max-height: 90vh;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-md);
  transform: scale(0.96);
  transition: transform 0.22s ease-in-out;
  display: flex;
  flex-direction: column;
}

.modal-overlay.active .modal-container {
  transform: scale(1);
}

.modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  background: var(--bg-page);
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  font-size: 1.5rem;
  font-weight: 300;
  cursor: pointer;
  line-height: 1;
  transition: var(--transition);
  z-index: 10;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
}

.modal-close:hover {
  color: var(--text-primary);
  border-color: var(--border-hover);
  background-color: var(--bg-section);
}

.modal-content {
  display: flex;
  height: 100%;
  overflow: hidden;
}

.modal-poster-side {
  flex: 0.8;
  background-color: var(--bg-page);
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  border-right: 1px solid var(--border-color);
}

.modal-poster-side img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.modal-info-side {
  flex: 1.2;
  padding: 44px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  background-color: var(--bg-surface);
}

.modal-badge {
  align-self: flex-start;
  font-family: var(--font-body);
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--accent);
  background-color: var(--accent-light);
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  margin-bottom: 18px;
}

.modal-title {
  font-family: var(--font-heading);
  font-size: 2rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
  line-height: 1.25;
}

.modal-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 18px;
  font-size: 0.95rem;
  color: var(--text-secondary);
}

.modal-year {
  font-weight: 500;
}

.modal-rating {
  display: flex;
  align-items: center;
  gap: 4px;
  color: var(--accent);
  font-weight: 600;
}

.modal-genres {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 22px;
}

/* Neutral sand genre chips for modal */
.modal-genres .badge {
  padding: 4px 10px;
  font-size: 0.75rem;
  background-color: var(--bg-light);
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
}

.modal-overview {
  font-size: 0.94rem;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 28px;
}

.modal-cta-btn {
  margin-top: auto;
  align-self: flex-start;
  padding: 12px 24px;
  font-size: 0.95rem;
}

/* Footer Section */
.footer {
  border-top: 1px solid var(--border-color);
  padding: 40px 24px;
  text-align: center;
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-top: auto;
  background-color: var(--bg-section);
}

.footer-content {
  max-width: 1200px;
  margin: 0 auto;
}

/* Responsiveness */
@media (max-width: 960px) {
  .spotlight-content {
    flex-direction: column-reverse;
  }
  .spotlight-poster-wrapper {
    max-height: 320px;
    border-left: none;
    border-bottom: 1px solid var(--border-color);
  }
  .spotlight-info {
    padding: 28px;
  }
  .hero h1 {
    font-size: 1.75rem;
  }
  .section-header {
    flex-direction: column;
    gap: 4px;
    align-items: flex-start;
  }
}

@media (max-width: 768px) {
  .modal-container {
    max-height: 95vh;
  }
  .modal-content {
    flex-direction: column;
    overflow-y: auto;
  }
  .modal-poster-side {
    height: 260px;
    flex: none;
    border-right: none;
    border-bottom: 1px solid var(--border-color);
  }
  .modal-info-side {
    padding: 24px;
    flex: none;
    overflow-y: visible;
  }
  .modal-title {
    font-size: 1.6rem;
  }
  .modal-close {
    top: 12px;
    right: 12px;
    background-color: rgba(255, 255, 255, 0.9);
  }
}

@media (max-width: 640px) {
  .container {
    padding: 16px 16px 48px 16px;
  }
  .hero h1 {
    font-size: 1.55rem;
  }
  .hero p {
    font-size: 0.88rem;
  }
  .grid {
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }
  .card-meta {
    padding: 10px 12px;
  }
  .card-title {
    font-size: 0.9rem;
    margin-bottom: 4px;
  }
  .spotlight-title {
    font-size: 1.65rem;
  }
  .spotlight-info {
    padding: 20px;
  }
  .navbar {
    padding: 12px 16px;
  }
  .navbar-nav {
    gap: 16px;
  }
  .navbar-brand {
    font-size: 1.2rem;
  }
}
</style>
</head>

<body>

<!-- Navigation Header -->
<header class="navbar">
  <div class="navbar-container">
    <a href="/" class="navbar-brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect>
        <line x1="7" y1="2" x2="7" y2="22"></line>
        <line x1="17" y1="2" x2="17" y2="22"></line>
        <line x1="2" y1="12" x2="22" y2="12"></line>
        <line x1="2" y1="7" x2="7" y2="7"></line>
        <line x1="2" y1="17" x2="7" y2="17"></line>
        <line x1="17" y1="17" x2="22" y2="17"></line>
        <line x1="17" y1="7" x2="22" y2="7"></line>
      </svg>
      CineMatch
    </a>
    <nav class="navbar-nav">
      <a href="/" class="navbar-link active">Discover</a>
      <a href="#" class="navbar-link" onclick="loadTrending(); return false;">Trending</a>
    </nav>
  </div>
</header>

<div class="container">

  <!-- Hero Section -->
  <section class="hero">
    <h1>Discover Films You'll Love</h1>
    <p>Search for a film you love and uncover a curated list of films you won't want to miss.</p>
  </section>

  <!-- Search Input Container - Core Action Focus -->
  <section class="search-container">
    <div class="search-input-wrapper">
      <div class="search-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </div>
      <input id="movie" class="search-input" placeholder="Type a movie title (e.g. Inception, Avatar...)" aria-label="Search movie recommendations" />
    </div>
    <button id="search-btn" class="btn-primary" onclick="recommend()">
      <span id="spinner" class="spinner" style="display: none;"></span>
      <span id="search-btn-text">Find Recommendations</span>
    </button>
  </section>

  <!-- Status & Error Alert Container -->
  <div id="status" class="center"></div>

  <!-- Featured Spotlight Banner -->
  <section id="spotlight-container" class="spotlight-container" style="display: none;"></section>

  <!-- Recommendations / Grid Results Section -->
  <section id="section">
    <div class="section-header">
      <h2 id="section-title" class="section-title"></h2>
      <div id="helper" class="helper"></div>
    </div>
    <div id="results" class="grid"></div>
  </section>

</div>

<!-- Details Modal -->
<div id="details-modal" class="modal-overlay" aria-hidden="true" style="display: none;">
  <div class="modal-container">
    <button class="modal-close" aria-label="Close details modal">&times;</button>
    <div class="modal-content">
      <div class="modal-poster-side">
        <img id="modal-poster" src="" alt="Movie Poster">
      </div>
      <div class="modal-info-side">
        <div class="modal-badge">FILM DETAILS</div>
        <h2 id="modal-title" class="modal-title"></h2>
        <div class="modal-meta">
          <span id="modal-year" class="modal-year"></span>
          <span id="modal-rating" class="modal-rating"></span>
        </div>
        <div id="modal-genres" class="modal-genres"></div>
        <p id="modal-overview" class="modal-overview"></p>
        <button id="modal-cta-btn" class="btn-primary modal-cta-btn">
          Get Recommendations
        </button>
      </div>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="footer-content">
    <div>Built with Flask • Python • Scikit-Learn • TMDB API</div>
  </div>
</footer>

<script>
const API = window.location.origin;
let currentRecommendations = [];
let isSearching = false;

// Close details modal
function closeModal() {
  const modal = document.getElementById("details-modal");
  modal.classList.remove("active");
  document.body.style.overflow = "";
  modal.setAttribute("aria-hidden", "true");
  setTimeout(() => {
    if (!modal.classList.contains("active")) {
      modal.style.display = "none";
    }
  }, 220);
}

// Open details modal with recommendation properties
function openRecommendationDetails(index) {
  const movie = currentRecommendations[index];
  if (!movie) return;

  const poster = movie.poster && movie.poster !== "https://via.placeholder.com/300x450" 
    ? movie.poster 
    : "https://via.placeholder.com/300x450";
  const genres = (movie.genres || []).slice(0, 3).map(g => `<span class="badge">${g}</span>`).join("");
  const year = movie.release_date ? movie.release_date.substring(0, 4) : "N/A";
  const rating = movie.vote_average ? `${movie.vote_average.toFixed(1)}/10` : "N/A";

  document.getElementById("modal-poster").src = poster;
  document.getElementById("modal-poster").alt = movie.title + " Poster";
  document.getElementById("modal-title").innerText = movie.title;
  document.getElementById("modal-year").innerText = year;
  document.getElementById("modal-rating").innerHTML = `
    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="margin-right:2px; vertical-align:middle; display:inline-block; margin-top:-3px; fill:var(--accent);">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
    </svg>
    ${rating}
  `;
  document.getElementById("modal-genres").innerHTML = genres;
  document.getElementById("modal-overview").innerText = movie.overview || "No description available.";
  
  // Set up CTA button click in modal
  const ctaBtn = document.getElementById("modal-cta-btn");
  ctaBtn.onclick = function() {
    closeModal();
    reseed(movie.title);
  };

  const modal = document.getElementById("details-modal");
  modal.style.display = "flex";
  modal.setAttribute("aria-hidden", "false");
  // Trigger transition reflow
  setTimeout(() => {
    modal.classList.add("active");
  }, 10);
  
  // Disable body scroll when modal is active
  document.body.style.overflow = "hidden";
}

// Render Spotlight (Featured Banner)
function renderSpotlight(movie) {
  const container = document.getElementById("spotlight-container");
  if (!movie) {
    container.style.display = "none";
    return;
  }

  const poster = movie.poster && movie.poster !== "https://via.placeholder.com/300x450" 
    ? movie.poster 
    : "https://via.placeholder.com/300x450";
  const year = movie.release_date ? movie.release_date.substring(0, 4) : "";
  const rating = movie.vote_average ? `${movie.vote_average.toFixed(1)}` : "";
  const genresList = (movie.genres || []).slice(0, 3).join(", ");

  const metaParts = [];
  if (year) metaParts.push(`<span class="spotlight-year">${year}</span>`);
  if (rating) {
    metaParts.push(`
      <span class="spotlight-rating">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="margin-right:2px; vertical-align:middle; display:inline-block; margin-top:-3px; fill:var(--accent);">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
        </svg>
        ${rating}/10
      </span>
    `);
  }
  if (genresList) metaParts.push(`<span class="spotlight-genres-text">${genresList}</span>`);
  const metadataLine = metaParts.join(" &bull; ");

  container.innerHTML = `
    <div class="spotlight-content">
      <div class="spotlight-info">
        <div class="spotlight-badge">EDITOR'S PICK</div>
        <h2 class="spotlight-title">${movie.title}</h2>
        <div class="spotlight-meta">
          ${metadataLine}
        </div>
        ${movie.tagline ? `<p class="spotlight-tagline">“${movie.tagline}”</p>` : ""}
        ${movie.overview ? `<p class="spotlight-overview">${movie.overview}</p>` : ""}
        <button class="btn-primary spotlight-btn" onclick="reseed('${movie.title.replace(/'/g, "\\'")}')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          Get Recommendations
        </button>
      </div>
      <div class="spotlight-poster-wrapper">
        <img class="spotlight-poster" src="${poster}" alt="${movie.title} Poster">
      </div>
    </div>
  `;
  container.style.display = "block";
}

// Show skeleton loaders in grid
function showLoader() {
  const grid = document.getElementById("results");
  document.getElementById("status").innerHTML = "";
  
  let html = "";
  for (let i = 0; i < 8; i++) {
    html += `
      <div class="skeleton-card">
        <div class="skeleton-poster"></div>
        <div class="skeleton-meta">
          <div class="skeleton-title"></div>
          <div class="skeleton-genre"></div>
        </div>
      </div>
    `;
  }
  grid.innerHTML = html;
}

// Render cards
function renderCards(list, titleText, helperText = "", isTrending = false) {
  const grid = document.getElementById("results");
  const title = document.getElementById("section-title");
  const helper = document.getElementById("helper");
  const spotlightContainer = document.getElementById("spotlight-container");

  title.innerText = titleText;
  helper.innerText = helperText;

  // Add fade-in animation on container
  grid.classList.remove("fade-in");
  void grid.offsetWidth; // Trigger layout reflow to restart animation
  grid.classList.add("fade-in");

  if (!list || list.length === 0) {
    grid.innerHTML = "";
    spotlightContainer.style.display = "none";
    document.getElementById("status").innerHTML = `<div class="center">No results found. Try another search term.</div>`;
    return;
  }

  document.getElementById("status").innerHTML = "";

  let displayList = list;

  // Render the spotlight block only for trending list
  if (isTrending && list.length > 0) {
    const featured = list[0];
    renderSpotlight(featured);
    displayList = list.slice(1);
  } else {
    spotlightContainer.style.display = "none";
    // Store in global variable for modal lookup
    currentRecommendations = list;
  }

  let html = "";
  displayList.forEach((m, index) => {
    const poster = m.poster && m.poster !== "https://via.placeholder.com/300x450" 
      ? m.poster 
      : "https://via.placeholder.com/300x450";
    const genres = (m.genres || []).slice(0,3).map(g => `<span class="badge">${g}</span>`).join("");
    
    // Icon for similarity
    const sim = (m.similarity !== undefined) 
      ? `<div class="sim">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="margin-right:2px;">
            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
            <polyline points="17 6 23 6 23 12"></polyline>
          </svg>
          ${m.similarity}% Match
         </div>` 
      : "";

    // Separated click behavior
    const clickHandler = isTrending 
      ? `reseed('${m.title.replace(/'/g, "\\'")}')` 
      : `openRecommendationDetails(${index})`;

    html += `
      <div class="card" onclick="${clickHandler}" aria-label="${isTrending ? 'Get recommendations like ' : 'View details of '}${m.title}">
        <div class="card-poster-wrapper">
          <img class="card-poster" src="${poster}" alt="${m.title} Poster" loading="lazy">
        </div>
        <div class="card-meta">
          <h3 class="card-title">${m.title}</h3>
          <div class="card-genres">${genres}</div>
          ${sim}
        </div>
      </div>
    `;
  });

  grid.innerHTML = html;
}

// Recommend from input search
async function recommend() {
  if (isSearching) return;

  const movieInput = document.getElementById("movie");
  const movie = movieInput.value.trim();
  if (!movie) return;

  isSearching = true;

  // Update button UI state
  const searchBtn = document.getElementById("search-btn");
  const searchBtnText = document.getElementById("search-btn-text");
  const spinner = document.getElementById("spinner");

  searchBtn.disabled = true;
  spinner.style.display = "inline-block";
  searchBtnText.innerText = "Finding Recommendations...";

  // Show loaders and hide spotlight immediately
  showLoader();
  document.getElementById("spotlight-container").style.display = "none";

  try {
    const res = await fetch(`${API}/recommend?movie=${encodeURIComponent(movie)}&n=10`);
    const data = await res.json();

    renderCards(
      data,
      `Because You Liked "${movie}"`,
      `${data.length} recommendations found`,
      false
    );
    
    // Smooth scroll to results
    document.getElementById("section").scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch (e) {
    document.getElementById("status").innerHTML = `
      <div class="error-message">
        Server error. Failed to load recommendations. Please try again.
      </div>
    `;
    document.getElementById("results").innerHTML = "";
  } finally {
    isSearching = false;
    searchBtn.disabled = false;
    spinner.style.display = "none";
    searchBtnText.innerText = "Find Recommendations";
  }
}

// Click card to re-seed search (from trending and modal CTA)
function reseed(title) {
  document.getElementById("movie").value = title;
  recommend();
}

// Fetch and load trending movies on load
async function loadTrending() {
  if (isSearching) return;
  showLoader();
  try {
    const res = await fetch(`${API}/trending`);
    const data = await res.json();

    renderCards(
      data,
      "Trending discovery",
      "Select a movie to get personalized recommendations.",
      true
    );
  } catch (e) {
    document.getElementById("status").innerHTML = `
      <div class="error-message">
        Failed to load trending movies.
      </div>
    `;
    document.getElementById("results").innerHTML = "";
  }
}

// Setup Modal event handlers
document.addEventListener("DOMContentLoaded", () => {
  const modal = document.getElementById("details-modal");
  const closeBtn = modal.querySelector(".modal-close");

  closeBtn.addEventListener("click", closeModal);

  // Click outside to close
  modal.addEventListener("click", (e) => {
    if (e.target === modal) {
      closeModal();
    }
  });

  // ESC key to close
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && modal.classList.contains("active")) {
      closeModal();
    }
  });
});

// Support hitting enter in search field
document.getElementById("movie").addEventListener("keypress", (e) => {
  if (e.key === "Enter" && !isSearching) recommend();
});

// Initialize trending on page load
window.onload = loadTrending;
</script>

</body>
</html>
